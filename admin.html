<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THISISPEARWAY — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800;900&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F0EBE3;--ink:#0A0A0A;--blue:#1B4AE8;
  --cream:#EDEAE3;--border:rgba(27,74,232,.15);
  --danger:#FF1744;--success:#00C853;
}
body{background:var(--bg);color:var(--ink);font-family:'Barlow',sans-serif;min-height:100vh}

/* ── Topbar */
.topbar{
  position:sticky;top:0;z-index:100;
  background:var(--ink);padding:0 40px;
  display:flex;justify-content:space-between;align-items:center;height:60px;
}
.topbar-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:var(--bg)}
.topbar-tag{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--blue);border:1px solid var(--blue);padding:4px 12px;border-radius:99px}
.topbar-actions{display:flex;gap:10px;align-items:center}
.btn{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:12px;letter-spacing:.12em;text-transform:uppercase;padding:8px 20px;border-radius:6px;border:none;cursor:pointer;transition:opacity .2s}
.btn:hover{opacity:.8}
.btn-primary{background:var(--blue);color:#fff}
.btn-secondary{background:rgba(240,235,227,.12);color:var(--bg);border:1px solid rgba(240,235,227,.2)}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:6px 14px;font-size:11px}

/* ── Layout */
.layout{display:grid;grid-template-columns:300px 1fr;min-height:calc(100vh - 60px)}

/* ── Sidebar */
.sidebar{background:var(--cream);border-right:1px solid var(--border);display:flex;flex-direction:column}
.sidebar-head{padding:20px 20px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.sidebar-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:13px;letter-spacing:.1em;text-transform:uppercase}
.project-list{flex:1;overflow-y:auto;padding:10px}
.proj-item{
  padding:12px 14px;border-radius:8px;margin-bottom:4px;
  cursor:pointer;border:1.5px solid transparent;
  display:flex;align-items:center;gap:10px;
  transition:all .15s;
}
.proj-item:hover{background:white;border-color:var(--border)}
.proj-item.active{background:white;border-color:var(--blue)}
.proj-item.dragging{opacity:.35}
.proj-item.drag-over{border-color:var(--blue);background:#eef1ff}
.proj-thumb{
  width:40px;height:40px;border-radius:4px;flex-shrink:0;
  background-size:cover;background-position:center;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-family:'Barlow Condensed',sans-serif;font-weight:900;letter-spacing:.08em;color:rgba(0,0,0,.3);
}
.proj-info{flex:1;min-width:0}
.proj-name{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:12px;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj-cat{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--blue);opacity:.6;margin-top:2px}
.proj-drag{color:rgba(0,0,0,.18);font-size:14px;flex-shrink:0;cursor:grab}
.sidebar-footer{padding:14px;border-top:1px solid var(--border)}

/* ── Editor */
.editor{padding:36px 40px 100px;overflow-y:auto;max-height:calc(100vh - 60px)}
.editor-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:12px;opacity:.25}
.editor-empty-icon{font-size:40px}
.editor-empty-txt{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:14px;letter-spacing:.1em;text-transform:uppercase;text-align:center}

/* ── Form */
.sec{margin-bottom:36px}
.sec-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--blue);opacity:.65;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.row.full{grid-template-columns:1fr}
.fg{display:flex;flex-direction:column;gap:5px}
.lbl{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink);opacity:.4}
input.fi,select.fi,textarea.fi{
  padding:9px 12px;border:1.5px solid var(--border);border-radius:6px;
  background:white;color:var(--ink);font-family:'Barlow',sans-serif;font-size:13px;
  outline:none;transition:border-color .2s;
}
input.fi:focus,select.fi:focus,textarea.fi:focus{border-color:var(--blue)}
textarea.fi{resize:vertical;min-height:72px;line-height:1.6}

/* Color */
.color-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
input[type=color]{width:44px;height:36px;padding:2px 3px;border-radius:5px;border:1.5px solid var(--border);cursor:pointer}
.cdot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s;flex-shrink:0}
.cdot:hover{transform:scale(1.18)}
.cdot.sel{border-color:var(--ink)}

/* Tags */
.tags-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.tag-chip{display:inline-flex;align-items:center;gap:5px;background:var(--blue);color:#fff;padding:3px 10px;border-radius:99px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:10px;letter-spacing:.1em;text-transform:uppercase}
.tag-x{cursor:pointer;opacity:.7;font-size:12px}
.tag-x:hover{opacity:1}
.tag-add{display:flex;gap:8px}

/* ── Image upload zone */
.upload-zone{
  border:2px dashed var(--border);border-radius:10px;
  background:white;cursor:pointer;
  transition:all .2s;position:relative;overflow:hidden;
  text-align:center;
}
.upload-zone:hover,.upload-zone.over{border-color:var(--blue);background:#f0f3ff}
.upload-zone.over{border-style:solid}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-inner{padding:28px 20px;pointer-events:none}
.upload-icon{font-size:28px;margin-bottom:8px;opacity:.4}
.upload-txt{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);opacity:.7}
.upload-sub{font-size:11px;color:var(--ink);opacity:.3;margin-top:4px}
.upload-preview{width:100%;border-radius:6px;display:none;aspect-ratio:16/9;object-fit:cover}
.upload-preview.show{display:block}
.upload-change{display:none;padding:10px;text-align:center}
.upload-change.show{display:block}
.upload-change-btn{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--blue);background:none;border:none;cursor:pointer;opacity:.6}
.upload-change-btn:hover{opacity:1}

/* ── Blocks */
.blocks-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.block-card{background:white;border:1.5px solid var(--border);border-radius:8px;overflow:hidden}
.block-head{padding:11px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.block-badge{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--blue);background:rgba(27,74,232,.08);padding:3px 10px;border-radius:99px}
.block-head-r{display:flex;gap:8px;align-items:center}
.block-drag{color:rgba(0,0,0,.18);cursor:grab;font-size:13px}
.block-del{font-size:13px;color:var(--danger);opacity:.55;cursor:pointer;background:none;border:none;transition:opacity .15s}
.block-del:hover{opacity:1}
.block-body{padding:14px;display:none;border-top:1px solid var(--border)}
.block-body.open{display:block}

/* Block image grid inside block */
.block-imgs{display:flex;flex-direction:column;gap:10px}
.block-img-slot{
  border:2px dashed var(--border);border-radius:8px;
  background:#fafafa;cursor:pointer;
  position:relative;overflow:hidden;transition:all .2s;
}
.block-img-slot:hover,.block-img-slot.over{border-color:var(--blue);background:#f0f3ff}
.block-img-slot input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.slot-inner{padding:16px;text-align:center;pointer-events:none}
.slot-icon{font-size:20px;opacity:.3;margin-bottom:4px}
.slot-txt{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);opacity:.6}
.slot-preview{width:100%;border-radius:5px;display:none;max-height:200px;object-fit:cover}
.slot-preview.show{display:block}
.slot-del{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.5);color:white;border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:12px;display:none;align-items:center;justify-content:center}
.slot-del.show{display:flex}
.slot-del:hover{background:var(--danger)}

/* Add blocks row */
.add-blocks{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.add-btn{
  font-family:'Barlow Condensed',sans-serif;font-weight:900;
  font-size:9px;letter-spacing:.08em;text-transform:uppercase;
  padding:10px 4px;border-radius:6px;
  border:1.5px dashed var(--border);background:white;
  cursor:pointer;color:var(--ink);opacity:.45;transition:all .18s;text-align:center;line-height:1.4;
}
.add-btn:hover{opacity:1;border-color:var(--blue);color:var(--blue)}

/* Actions bar */
.actions-bar{
  position:sticky;bottom:0;
  background:white;border-top:1px solid var(--border);
  padding:14px 40px;
  display:flex;justify-content:space-between;align-items:center;
  margin:0 -40px;
}
.save-st{font-size:11px;letter-spacing:.08em;text-transform:uppercase;opacity:.3}
.save-st.saved{color:var(--success);opacity:1}

/* Toast */
.toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);
  background:var(--ink);color:var(--bg);
  font-family:'Barlow Condensed',sans-serif;font-weight:900;
  font-size:12px;letter-spacing:.1em;text-transform:uppercase;
  padding:11px 22px;border-radius:99px;
  opacity:0;transition:all .22s;pointer-events:none;z-index:500;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Storage bar */
.storage-bar{padding:10px 20px;background:rgba(27,74,232,.06);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;font-size:11px;opacity:.6}
.storage-fill{height:4px;background:var(--blue);border-radius:99px;transition:width .3s}
.storage-track{flex:1;height:4px;background:rgba(27,74,232,.15);border-radius:99px;overflow:hidden}
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center;gap:14px">
    <span class="topbar-logo">THISISPEARWAY</span>
    <span class="topbar-tag">Admin</span>
  </div>
  <div class="topbar-actions">
  </div>
</div>

<!-- Storage usage bar -->
<div class="storage-bar" id="storageBar">
  <span>저장소 사용량</span>
  <div class="storage-track"><div class="storage-fill" id="storageFill" style="width:0%"></div></div>
  <span id="storageText">계산 중...</span>
</div>

<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-head">
      <span class="sidebar-title" id="projCount">프로젝트 (0)</span>
    </div>
    <div class="project-list" id="projList"></div>
    <div class="sidebar-footer">
      <button class="btn btn-primary" style="width:100%" onclick="newProject()">+ 새 프로젝트</button>
    </div>
  </div>

  <!-- Editor -->
  <div class="editor" id="editor">
    <div class="editor-empty" id="edEmpty">
      <div class="editor-empty-icon">✦</div>
      <div class="editor-empty-txt">왼쪽에서 프로젝트를<br>선택하거나 새로 추가하세요</div>
    </div>

    <div id="edForm" style="display:none">

      <!-- 기본 정보 -->
      <div class="sec">
        <div class="sec-title">기본 정보</div>
        <div class="row">
          <div class="fg"><label class="lbl">프로젝트 이름 *</label><input class="fi" id="f-title" placeholder="프로젝트 이름"></div>
          <div class="fg"><label class="lbl">연도</label><input class="fi" id="f-year" placeholder="2024" maxlength="4"></div>
        </div>
        <div class="row">
          <div class="fg">
            <label class="lbl">카테고리</label>
            <select class="fi" id="f-cat">
              <option value="brand">Brand — 브랜드</option>
              <option value="graphic">Graphic — 그래픽</option>
              <option value="spatial">Spatial — 공간</option>
            </select>
          </div>
          <div class="fg">
            <label class="lbl">배경색</label>
            <div class="color-row">
              <input type="color" id="f-color" value="#D0CCCA">
              <div id="colorDots"></div>
            </div>
          </div>
        </div>
        <div class="row full">
          <div class="fg"><label class="lbl">프로젝트 설명</label><textarea class="fi" id="f-desc" placeholder="프로젝트 소개를 입력하세요."></textarea></div>
        </div>
      </div>

      <!-- 태그 -->
      <div class="sec">
        <div class="sec-title">태그</div>
        <div class="tags-wrap" id="tagsWrap"></div>
        <div class="tag-add">
          <input class="fi" id="tagIn" placeholder="태그 입력 후 Enter" style="flex:1">
          <button class="btn btn-primary btn-sm" onclick="addTag()">추가</button>
        </div>
      </div>

      <!-- 썸네일 -->
      <div class="sec">
        <div class="sec-title">썸네일 이미지</div>
        <div class="upload-zone" id="thumbZone">
          <input type="file" accept="image/*" id="thumbFile" onchange="handleThumbUpload(this)">
          <img class="upload-preview" id="thumbPreview">
          <div class="upload-inner" id="thumbInner">
            <div class="upload-icon">🖼</div>
            <div class="upload-txt">클릭하거나 이미지를 여기 드래그</div>
            <div class="upload-sub">JPG, PNG, WebP — 1200×800px 권장</div>
          </div>
          <div class="upload-change" id="thumbChange">
            <button type="button" class="upload-change-btn" onclick="clearThumb(event)">✕ 이미지 제거</button>
          </div>
        </div>
      </div>

      <!-- 상세 이미지 블록 -->
      <div class="sec">
        <div class="sec-title">상세 이미지 — 비핸스 스타일</div>
        <p style="font-size:12px;opacity:.4;margin-bottom:14px;line-height:1.6">블록을 추가하고 이미지를 직접 업로드하세요.</p>
        <div class="blocks-list" id="blocksList"></div>
        <div style="margin-bottom:8px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:10px;letter-spacing:.14em;text-transform:uppercase;opacity:.35">+ 블록 추가</div>
        <div class="add-blocks">
          <button class="add-btn" onclick="addBlock('img')">📷<br>풀와이드</button>
          <button class="add-btn" onclick="addBlock('2col')">⬜⬜<br>2장 나란히</button>
          <button class="add-btn" onclick="addBlock('3col')">⬜⬜⬜<br>3장 나란히</button>
          <button class="add-btn" onclick="addBlock('text')">📝<br>텍스트</button>
          <button class="add-btn" onclick="addBlock('split')">🖼📝<br>이미지+글</button>
        </div>
      </div>

      <div class="actions-bar">
        <span class="save-st" id="saveSt">저장되지 않음</span>
        <div style="display:flex;gap:10px">
          <button class="btn btn-danger" onclick="deleteProject()">삭제</button>
          <button class="btn btn-primary" onclick="saveProject()">저장</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── State
let projects = [];
let cur = null; // current index
let dragSrc = null;

const LABELS = {brand:'Brand',typography:'Typography',graphic:'Graphic',spatial:'Spatial'};
const COLORS = ['#D0CCCA','#C8C4BC','#CECCCA','#C4C0B8','#1B4AE8','#0A0A0A','#E8E4DC','#B8B0A8'];

// ── Init
window.addEventListener('DOMContentLoaded', () => {
  load();
  buildColorDots();
  document.getElementById('tagIn').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); addTag(); }
  });
  setupThumbDrop();
  updateStorage();
});

// ── Persist
function load() {
  try { projects = JSON.parse(localStorage.getItem('tip_projects') || '[]'); } catch(e) { projects = []; }
  if (!projects.length) projects = defaults();
  renderList();
}

function persist() {
  try {
    localStorage.setItem('tip_projects', JSON.stringify(projects));
    // notify index.html if open in another tab
    window.dispatchEvent(new StorageEvent('storage', {
      key:'tip_projects', newValue:JSON.stringify(projects), storageArea:localStorage
    }));
    updateStorage();
  } catch(e) {
    if (e.name === 'QuotaExceededError') {
      toast('저장 공간 부족! 이미지를 줄여주세요.', true);
    }
  }
}

function updateStorage() {
  try {
    let used = 0;
    for (let k in localStorage) used += (localStorage[k].length + k.length) * 2;
    const mb = (used / 1024 / 1024).toFixed(1);
    const pct = Math.min((used / (5 * 1024 * 1024)) * 100, 100);
    document.getElementById('storageFill').style.width = pct + '%';
    document.getElementById('storageText').textContent = `${mb}MB / 5MB`;
    document.getElementById('storageFill').style.background =
      pct > 80 ? 'var(--danger)' : pct > 60 ? '#FF6D00' : 'var(--blue)';
  } catch(e) {}
}

function defaults() {
  return [];
}

// ── Sidebar
function renderList() {
  document.getElementById('projCount').textContent = `프로젝트 (${projects.length})`;
  document.getElementById('projList').innerHTML = projects.map((p, i) => `
    <div class="proj-item ${i===cur?'active':''}" onclick="select(${i})"
      draggable="true"
      ondragstart="onDS(event,${i})" ondragover="onDO(event,${i})"
      ondrop="onDrop(event,${i})" ondragend="onDE()">
      <div class="proj-thumb" style="background:${p.thumb?`url('${p.thumb}') center/cover`:p.color}">
        ${p.thumb?'':LABELS[p.cat]?.slice(0,2)}
      </div>
      <div class="proj-info">
        <div class="proj-name">${p.title||'이름 없음'}</div>
        <div class="proj-cat">${LABELS[p.cat]||''} · ${p.year||'-'}</div>
      </div>
      <span class="proj-drag">⠿</span>
    </div>
  `).join('');
}

// ── Select
function select(idx) {
  if (cur !== null) syncFormToState();
  cur = idx;
  renderList();
  renderForm(projects[idx]);
  document.getElementById('edEmpty').style.display = 'none';
  document.getElementById('edForm').style.display = 'block';
}

function renderForm(p) {
  document.getElementById('f-title').value = p.title||'';
  document.getElementById('f-year').value = p.year||'';
  document.getElementById('f-cat').value = p.cat||'brand';
  document.getElementById('f-color').value = p.color||'#D0CCCA';
  document.getElementById('f-desc').value = p.desc||'';
  document.getElementById('saveSt').textContent = '저장되지 않음';
  document.getElementById('saveSt').classList.remove('saved');
  renderTags(p.tags||[]);
  renderThumb(p.thumb||'');
  renderBlocks(p.blocks||[]);
  updateColorDots(p.color);
}

function syncFormToState() {
  if (cur === null || !projects[cur]) return;
  const p = projects[cur];
  p.title = document.getElementById('f-title').value;
  p.year  = document.getElementById('f-year').value;
  p.cat   = document.getElementById('f-cat').value;
  p.color = document.getElementById('f-color').value;
  p.desc  = document.getElementById('f-desc').value;
  // thumb, tags, blocks already synced live
}

// ── Tags
function renderTags(tags) {
  document.getElementById('tagsWrap').innerHTML = (tags||[]).map((t,i) =>
    `<span class="tag-chip">${t}<span class="tag-x" onclick="removeTag(${i})">✕</span></span>`
  ).join('');
}
function addTag() {
  if (cur===null) return;
  const v = document.getElementById('tagIn').value.trim();
  if (!v) return;
  if (!projects[cur].tags) projects[cur].tags = [];
  projects[cur].tags.push(v);
  document.getElementById('tagIn').value = '';
  renderTags(projects[cur].tags);
}
function removeTag(i) {
  if (cur===null) return;
  projects[cur].tags.splice(i,1);
  renderTags(projects[cur].tags);
}

// ── Color dots
function buildColorDots() {
  document.getElementById('colorDots').innerHTML = COLORS.map(c =>
    `<div class="cdot" style="background:${c}" title="${c}" onclick="setColor('${c}')"></div>`
  ).join('');
}
function setColor(c) {
  document.getElementById('f-color').value = c;
  if (cur !== null) projects[cur].color = c;
  updateColorDots(c);
}
function updateColorDots(active) {
  document.querySelectorAll('.cdot').forEach(d =>
    d.classList.toggle('sel', d.title === active));
}

// ── Thumb upload
function setupThumbDrop() {
  const zone = document.getElementById('thumbZone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('over'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('over');
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith('image/')) processThumbFile(f);
  });
}

function handleThumbUpload(input) {
  if (input.files[0]) processThumbFile(input.files[0]);
}

function processThumbFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    // 파일이 1.5MB 이하면 원본 그대로 사용 (압축 없음)
    if (file.size <= 1.5 * 1024 * 1024) {
      const b64 = e.target.result;
      if (cur !== null) projects[cur].thumb = b64;
      renderThumb(b64);
      renderList();
      return;
    }
    // 1.5MB 초과면 리사이즈 후 저장
    const isPng = file.type === 'image/png';
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 1200;
      const ratio = Math.min(MAX / img.width, MAX / img.height, 1);
      canvas.width  = Math.round(img.width  * ratio);
      canvas.height = Math.round(img.height * ratio);
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      if (!isPng) { ctx.fillStyle = '#fff'; ctx.fillRect(0,0,canvas.width,canvas.height); }
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      const b64 = canvas.toDataURL(isPng ? 'image/png' : 'image/jpeg', isPng ? 1 : 0.92);
      if (cur !== null) projects[cur].thumb = b64;
      renderThumb(b64);
      renderList();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function renderThumb(src) {
  const preview = document.getElementById('thumbPreview');
  const inner   = document.getElementById('thumbInner');
  const change  = document.getElementById('thumbChange');
  if (src) {
    preview.src = src;
    preview.classList.add('show');
    inner.style.display = 'none';
    change.classList.add('show');
  } else {
    preview.classList.remove('show');
    inner.style.display = '';
    change.classList.remove('show');
  }
}

function clearThumb(e) {
  e.stopPropagation();
  if (cur !== null) projects[cur].thumb = '';
  renderThumb('');
  renderList();
}

// ── Blocks
function renderBlocks(blocks) {
  const list = document.getElementById('blocksList');
  if (!blocks.length) {
    list.innerHTML = `<div style="text-align:center;padding:24px;border:2px dashed var(--border);border-radius:8px;background:white;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:11px;letter-spacing:.1em;text-transform:uppercase;opacity:.3">아직 이미지 블록이 없어요</div>`;
    return;
  }
  list.innerHTML = blocks.map((b, i) => buildBlockHTML(b, i)).join('');
  // setup drop zones for each slot
  list.querySelectorAll('.block-img-slot').forEach(slot => {
    slot.addEventListener('dragover', e => { e.preventDefault(); slot.classList.add('over'); });
    slot.addEventListener('dragleave', () => slot.classList.remove('over'));
    slot.addEventListener('drop', e => {
      e.preventDefault(); slot.classList.remove('over');
      const f = e.dataTransfer.files[0];
      if (f && f.type.startsWith('image/')) {
        const bi = +slot.dataset.bi, si = +slot.dataset.si;
        processSlotFile(f, bi, si);
      }
    });
  });
}

const BTYPES = {img:'풀와이드 이미지','2col':'2장 나란히','3col':'3장 나란히',text:'텍스트 블록',split:'이미지 + 텍스트'};

function buildBlockHTML(b, i) {
  let body = '';

  if (b.type === 'img') {
    body = slotHTML(b.src||'', i, 0, '이미지 업로드 (풀와이드)');
  } else if (b.type === '2col') {
    body = `<div class="block-imgs">
      ${slotHTML((b.src&&b.src[0])||'', i, 0, '왼쪽 이미지')}
      ${slotHTML((b.src&&b.src[1])||'', i, 1, '오른쪽 이미지')}
    </div>`;
  } else if (b.type === '3col') {
    body = `<div class="block-imgs">
      ${slotHTML((b.src&&b.src[0])||'', i, 0, '이미지 1')}
      ${slotHTML((b.src&&b.src[1])||'', i, 1, '이미지 2')}
      ${slotHTML((b.src&&b.src[2])||'', i, 2, '이미지 3')}
    </div>`;
  } else if (b.type === 'text') {
    body = `
      <div class="fg" style="margin-bottom:10px">
        <label class="lbl">제목 (선택)</label>
        <input class="fi" value="${b.heading||''}" placeholder="Design Process" onchange="blocks_upd(${i},'heading',this.value)">
      </div>
      <div class="fg">
        <label class="lbl">내용</label>
        <textarea class="fi" onchange="blocks_upd(${i},'body',this.value)">${b.body||''}</textarea>
      </div>`;
  } else if (b.type === 'split') {
    body = `
      ${slotHTML(b.src||'', i, 0, '이미지')}
      <div class="fg" style="margin-top:10px">
        <label class="lbl">옆 텍스트</label>
        <textarea class="fi" onchange="blocks_upd(${i},'body',this.value)">${b.body||''}</textarea>
      </div>`;
  }

  return `
    <div class="block-card" id="bc-${i}">
      <div class="block-head" onclick="toggleBlock(${i})">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="block-drag">⠿</span>
          <span class="block-badge">${BTYPES[b.type]||b.type}</span>
          <span style="font-size:11px;opacity:.25">#${i+1}</span>
        </div>
        <div class="block-head-r">
          <button class="block-del" onclick="event.stopPropagation();delBlock(${i})">✕</button>
        </div>
      </div>
      <div class="block-body open" id="bb-${i}">${body}</div>
    </div>`;
}

function slotHTML(src, bi, si, label) {
  return `
    <div class="block-img-slot" data-bi="${bi}" data-si="${si}">
      <input type="file" accept="image/*" onchange="handleSlotFile(this,${bi},${si})">
      <img class="slot-preview ${src?'show':''}" src="${src||''}" alt="">
      <div class="slot-inner" style="${src?'display:none':''}">
        <div class="slot-icon">📷</div>
        <div class="slot-txt">${label}</div>
        <div class="upload-sub">클릭 또는 드래그</div>
      </div>
      <button class="slot-del ${src?'show':''}" onclick="clearSlot(event,${bi},${si})">✕</button>
    </div>`;
}

function handleSlotFile(input, bi, si) {
  if (input.files[0]) processSlotFile(input.files[0], bi, si);
}

function processSlotFile(file, bi, si) {
  const reader = new FileReader();
  reader.onload = e => {
    const saveB64 = b64 => {
      if (cur === null) return;
      const block = projects[cur].blocks[bi];
      if (!block) return;
      if (block.type === 'img' || block.type === 'split') {
        block.src = b64;
      } else {
        if (!Array.isArray(block.src)) block.src = ['','',''];
        block.src[si] = b64;
      }
      renderBlocks(projects[cur].blocks);
    };

    // 2MB 이하면 원본 그대로
    if (file.size <= 2 * 1024 * 1024) {
      saveB64(e.target.result);
      return;
    }
    // 2MB 초과면 리사이즈
    const isPng = file.type === 'image/png';
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 2000;
      const ratio = Math.min(MAX / img.width, MAX / img.height, 1);
      canvas.width  = Math.round(img.width  * ratio);
      canvas.height = Math.round(img.height * ratio);
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      if (!isPng) { ctx.fillStyle = '#fff'; ctx.fillRect(0,0,canvas.width,canvas.height); }
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      saveB64(canvas.toDataURL(isPng ? 'image/png' : 'image/jpeg', isPng ? 1 : 0.92));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function clearSlot(e, bi, si) {
  e.stopPropagation();
  if (cur === null) return;
  const block = projects[cur].blocks[bi];
  if (!block) return;
  if (block.type === 'img' || block.type === 'split') {
    block.src = '';
  } else {
    if (Array.isArray(block.src)) block.src[si] = '';
  }
  renderBlocks(projects[cur].blocks);
}

function blocks_upd(bi, field, val) {
  if (cur === null) return;
  const b = projects[cur].blocks[bi];
  if (b) b[field] = val;
}

function toggleBlock(i) {
  document.getElementById(`bb-${i}`).classList.toggle('open');
}

function addBlock(type) {
  if (cur === null) return;
  syncFormToState();
  const defs = {
    img:   {type:'img', src:''},
    '2col':{type:'2col', src:['','']},
    '3col':{type:'3col', src:['','','']},
    text:  {type:'text', heading:'', body:''},
    split: {type:'split', src:'', body:''},
  };
  projects[cur].blocks.push({...defs[type]});
  renderBlocks(projects[cur].blocks);
}

function delBlock(i) {
  if (cur === null) return;
  projects[cur].blocks.splice(i, 1);
  renderBlocks(projects[cur].blocks);
}

// ── Save / New / Delete
function saveProject() {
  if (cur === null) return;
  syncFormToState();
  persist();
  renderList();
  document.getElementById('saveSt').textContent = '저장됨 ✓';
  document.getElementById('saveSt').classList.add('saved');
  toast('저장되었습니다 ✓');
}

function newProject() {
  if (cur !== null) syncFormToState();
  projects.push({
    title:'새 프로젝트', cat:'brand',
    year: new Date().getFullYear().toString(),
    color:'#D0CCCA', thumb:'', desc:'', tags:[], blocks:[]
  });
  persist();
  select(projects.length - 1);
}

function deleteProject() {
  if (cur === null) return;
  if (!confirm(`"${projects[cur].title}" 삭제할까요?`)) return;
  projects.splice(cur, 1);
  persist();
  cur = null;
  renderList();
  document.getElementById('edEmpty').style.display = 'flex';
  document.getElementById('edForm').style.display = 'none';
  toast('삭제되었습니다');
}

// ── Drag reorder
function onDS(e, i) { dragSrc = i; e.currentTarget.classList.add('dragging'); }
function onDO(e, i) {
  e.preventDefault();
  document.querySelectorAll('.proj-item').forEach(el => el.classList.remove('drag-over'));
  e.currentTarget.classList.add('drag-over');
}
function onDrop(e, i) {
  e.preventDefault();
  if (dragSrc === null || dragSrc === i) return;
  const item = projects.splice(dragSrc, 1)[0];
  projects.splice(i, 0, item);
  cur = i; persist(); renderList();
}
function onDE() {
  dragSrc = null;
  document.querySelectorAll('.proj-item').forEach(el =>
    el.classList.remove('dragging','drag-over'));
}

// ── Toast
function toast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = err ? 'var(--danger)' : 'var(--ink)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}
</script>
</body>
